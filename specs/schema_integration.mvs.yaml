      # Cross-dataset representative queries
      - id: join-staging-to-ods
        mode: measure
        sql: "SELECT s.invoice_id, a.invoice_no FROM ${BUILD_DATASET}.stg_fin_invoice s JOIN ${BUILD_DATASET}.ods_invoice_acid a ON a.invoice_id = s.invoice_id LIMIT 0"
      - id: join-ods-to-dm
        mode: measure
        sql: "SELECT i.interaction_id, f.handle_seconds FROM ${BUILD_DATASET}.ods_interaction i JOIN ${BUILD_DATASET}.fact_interaction f ON f.interaction_id = i.interaction_id LIMIT 0"
      - id: join-dm-fact-to-dim
        mode: measure
        sql: "SELECT f.interaction_id, a.full_name, p.program_name, q.queue_name FROM ${BUILD_DATASET}.fact_interaction f JOIN ${BUILD_DATASET}.dim_agent a ON a.agent_sk = f.agent_sk JOIN ${BUILD_DATASET}.dim_program p ON p.program_sk = f.program_sk JOIN ${BUILD_DATASET}.dim_queue q ON q.queue_sk = f.queue_sk LIMIT 0"
