# schema_apply.mvs.yaml — TARGET-ONLY schema conformance
# Proves all 100 BigQuery tables build and match the declared shape.
# AC1 (DDL creates), AC3 (object type), AC4 (partition/cluster), AC7/AC8 (integrity)
#
# NO source_setup / source_database — this spec only checks the target.
# Source cross-check is in schema_typemap.mvs.yaml.

name: schema_apply

connections:
  source: { engine: impala }
  target: { engine: bigquery }

migration:
  steps:
    - { kind: ddl, sql: sql/ddl/02-staging-sqoop-mirrors.sql }
    - { kind: ddl, sql: sql/ddl/03-staging-delta-feeds.sql }
    - { kind: ddl, sql: sql/ddl/04-staging-file-feeds.sql }
    - { kind: ddl, sql: sql/ddl/05-ods-cleanse.sql }
    - { kind: ddl, sql: sql/ddl/06-ods-delta-scd2.sql }
    - { kind: ddl, sql: sql/ddl/07-ods-acid.sql }
    - { kind: ddl, sql: sql/ddl/08-dm-tables.sql }

suites:
  # ── Staging (45 tables) ──
