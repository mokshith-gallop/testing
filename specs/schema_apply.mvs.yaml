  - pattern: schema_conformance
    id: dm-schema
    target_dataset: "${BUILD_DATASET}"
    tables:
        - table: dim_date
          expect_object_type: TABLE
          columns:
            - {name: date_key, type: INT64}
            - {name: full_date, type: STRING}
            - {name: day_of_week, type: INT64}
            - {name: day_name, type: STRING}
            - {name: week_of_year, type: INT64}
            - {name: month_no, type: INT64}
            - {name: month_name, type: STRING}
            - {name: quarter_no, type: INT64}
            - {name: year_no, type: INT64}
            - {name: is_weekend, type: BOOL}
            - {name: is_holiday_us, type: BOOL}
            - {name: fiscal_period, type: STRING}
        - table: dim_agent
          expect_object_type: TABLE
          columns:
            - {name: agent_sk, type: INT64}
            - {name: agent_id, type: INT64}
            - {name: employee_no, type: STRING}
            - {name: full_name, type: STRING}
            - {name: job_grade, type: STRING}
            - {name: employment_type, type: STRING}
            - {name: org_unit_id, type: INT64}
            - {name: team_name, type: STRING}
            - {name: site_code, type: STRING}
            - {name: status, type: STRING}
            - {name: hire_date_key, type: INT64}
            - {name: is_current, type: BOOL}
        - table: dim_client
          expect_object_type: TABLE
          columns:
            - {name: client_sk, type: INT64}
            - {name: client_id, type: INT64}
            - {name: client_code, type: STRING}
            - {name: client_name, type: STRING}
            - {name: industry, type: STRING}
            - {name: hq_country, type: STRING}
            - {name: primary_contact_name, type: STRING}
            - {name: primary_contact_email, type: STRING}
            - {name: status, type: STRING}
        - table: dim_program
          expect_object_type: TABLE
          columns:
            - {name: program_sk, type: INT64}
            - {name: program_id, type: INT64}
            - {name: program_code, type: STRING}
            - {name: program_name, type: STRING}
            - {name: client_id, type: INT64}
            - {name: line_of_business, type: STRING}
            - {name: channel_mix, type: STRING}
            - {name: site_code, type: STRING}
            - {name: billing_model, type: STRING}
            - {name: status, type: STRING}
            - {name: go_live_date_key, type: INT64}
        - table: dim_queue
          expect_object_type: TABLE
          columns:
            - {name: queue_sk, type: INT64}
            - {name: queue_id, type: INT64}
            - {name: queue_code, type: STRING}
            - {name: queue_name, type: STRING}
            - {name: program_id, type: INT64}
            - {name: media_type, type: STRING}
            - {name: priority, type: INT64}
        - table: dim_site
          expect_object_type: TABLE
          columns:
            - {name: site_sk, type: INT64}
            - {name: site_code, type: STRING}
            - {name: site_name, type: STRING}
            - {name: region, type: STRING}
            - {name: country, type: STRING}
            - {name: timezone, type: STRING}
        - table: dim_shift
          expect_object_type: TABLE
          columns:
            - {name: shift_sk, type: INT64}
            - {name: shift_id, type: INT64}
            - {name: shift_code, type: STRING}
            - {name: shift_name, type: STRING}
            - {name: start_hhmm, type: STRING}
            - {name: end_hhmm, type: STRING}
            - {name: overnight_flag, type: BOOL}
            - {name: site_code, type: STRING}
        - table: dim_org
          expect_object_type: TABLE
          columns:
            - {name: org_sk, type: INT64}
            - {name: org_unit_id, type: INT64}
            - {name: unit_code, type: STRING}
            - {name: unit_name, type: STRING}
            - {name: unit_type, type: STRING}
            - {name: level1_name, type: STRING}
            - {name: level2_name, type: STRING}
            - {name: level3_name, type: STRING}
            - {name: level4_name, type: STRING}
            - {name: site_code, type: STRING}
            - {name: cost_center, type: STRING}
        - table: dim_disposition
          expect_object_type: TABLE
          columns:
            - {name: disposition_sk, type: INT64}
            - {name: disposition_code, type: STRING}
            - {name: disposition_desc, type: STRING}
            - {name: category, type: STRING}
            - {name: billable_flag, type: BOOL}
        - table: fact_interaction
          expect_object_type: TABLE
          partition_by: date_key
          cluster_by: [channel, agent_sk, client_sk]
          columns:
            - {name: interaction_id, type: STRING}
            - {name: client_sk, type: INT64}
            - {name: program_sk, type: INT64}
            - {name: queue_sk, type: INT64}
            - {name: agent_sk, type: INT64}
            - {name: customer_ref, type: STRING}
            - {name: start_ts, type: TIMESTAMP}
            - {name: end_ts, type: TIMESTAMP}
            - {name: handle_seconds, type: INT64}
            - {name: resolved_flag, type: BOOL}
            - {name: source_system, type: STRING}
            - {name: channel, type: STRING}
            - {name: date_key, type: INT64}
        - table: fact_agent_activity
          expect_object_type: TABLE
          partition_by: date_key
          cluster_by: [agent_sk]
          columns:
            - {name: agent_sk, type: INT64}
            - {name: state_code, type: STRING}
            - {name: state_seconds, type: INT64}
            - {name: occurrence_count, type: INT64}
            - {name: first_state_ts, type: TIMESTAMP}
            - {name: last_state_ts, type: TIMESTAMP}
            - {name: date_key, type: INT64}
        - table: fact_queue_interval
          expect_object_type: TABLE
          partition_by: date_key
          cluster_by: [queue_sk]
          columns:
            - {name: queue_sk, type: INT64}
            - {name: interval_start_ts, type: TIMESTAMP}
            - {name: offered, type: INT64}
            - {name: answered, type: INT64}
            - {name: abandoned, type: INT64}
            - {name: answered_in_sl, type: INT64}
            - {name: sl_threshold_sec, type: INT64}
            - {name: avg_speed_answer_sec, type: "NUMERIC(8,2)", scale: 2}
            - {name: avg_handle_sec, type: "NUMERIC(8,2)", scale: 2}
            - {name: date_key, type: INT64}
        - table: fact_csat_survey
          expect_object_type: TABLE
          partition_by: date_key
          columns:
            - {name: survey_id, type: STRING}
            - {name: interaction_id, type: STRING}
            - {name: client_sk, type: INT64}
            - {name: program_sk, type: INT64}
            - {name: agent_sk, type: INT64}
            - {name: survey_ts, type: TIMESTAMP}
            - {name: csat_score, type: INT64}
            - {name: nps_score, type: INT64}
            - {name: fcr_claimed, type: BOOL}
            - {name: date_key, type: INT64}
        - table: fact_qa_evaluation
          expect_object_type: TABLE
          partition_by: date_key
          columns:
            - {name: qa_form_id, type: STRING}
            - {name: interaction_id, type: STRING}
            - {name: agent_sk, type: INT64}
            - {name: program_sk, type: INT64}
            - {name: evaluated_ts, type: TIMESTAMP}
            - {name: scored_points, type: INT64}
            - {name: max_points, type: INT64}
            - {name: overall_pct, type: "NUMERIC(5,2)", scale: 2}
            - {name: auto_fail, type: BOOL}
            - {name: date_key, type: INT64}
        - table: fact_billing_line
          expect_object_type: TABLE
          partition_by: period_month
          cluster_by: [client_sk, program_sk, invoice_status]
          columns:
            - {name: invoice_line_id, type: INT64}
            - {name: invoice_id, type: INT64}
            - {name: client_sk, type: INT64}
            - {name: program_sk, type: INT64}
            - {name: service_code, type: STRING}
            - {name: qty, type: "NUMERIC(12,2)", scale: 2}
            - {name: unit_rate, type: "NUMERIC(12,4)", scale: 4}
            - {name: line_amount, type: "NUMERIC(14,2)", scale: 2}
            - {name: adjustment_flag, type: BOOL}
            - {name: invoice_status, type: STRING}
            - {name: period_month, type: DATE}
        - table: fact_adherence_daily
          expect_object_type: TABLE
          partition_by: date_key
          columns:
            - {name: agent_sk, type: INT64}
            - {name: scheduled_minutes, type: INT64}
            - {name: worked_minutes, type: INT64}
            - {name: exception_minutes, type: INT64}
            - {name: timeoff_minutes, type: INT64}
            - {name: adherence_pct, type: "NUMERIC(5,2)", scale: 2}
            - {name: occupancy_pct, type: "NUMERIC(5,2)", scale: 2}
            - {name: date_key, type: INT64}
        - table: fact_ticket
          expect_object_type: TABLE
          partition_by: date_key
          columns:
            - {name: ticket_id, type: INT64}
            - {name: program_sk, type: INT64}
            - {name: category_code, type: STRING}
            - {name: assigned_agent_sk, type: INT64}
            - {name: priority, type: STRING}
            - {name: status, type: STRING}
            - {name: created_ts, type: TIMESTAMP}
            - {name: resolved_ts, type: TIMESTAMP}
            - {name: resolution_minutes, type: INT64}
            - {name: sla_breached_flag, type: BOOL}
            - {name: touch_count, type: INT64}
            - {name: date_key, type: INT64}
        - table: fact_ivr_path
          expect_object_type: TABLE
          partition_by: date_key
          columns:
            - {name: session_ref, type: STRING}
            - {name: client_code, type: STRING}
            - {name: menu_path_full, type: STRING}
            - {name: hops, type: INT64}
            - {name: contained_flag, type: BOOL}
            - {name: exit_key, type: STRING}
            - {name: duration_seconds, type: INT64}
            - {name: date_key, type: INT64}
        - table: agg_agent_daily
          expect_object_type: TABLE
          partition_by: date_key
          cluster_by: [agent_sk, site_code]
          columns:
            - {name: agent_sk, type: INT64}
            - {name: site_code, type: STRING}
            - {name: interactions_handled, type: INT64}
            - {name: avg_handle_seconds, type: "NUMERIC(8,2)", scale: 2}
            - {name: talk_seconds, type: INT64}
            - {name: acw_seconds, type: INT64}
            - {name: aux_seconds, type: INT64}
            - {name: adherence_pct, type: "NUMERIC(5,2)", scale: 2}
            - {name: occupancy_pct, type: "NUMERIC(5,2)", scale: 2}
            - {name: date_key, type: INT64}
        - table: agg_agent_weekly
          expect_object_type: TABLE
          partition_by: week_start_key
          columns:
            - {name: agent_sk, type: INT64}
            - {name: site_code, type: STRING}
            - {name: days_worked, type: INT64}
            - {name: interactions_handled, type: INT64}
            - {name: avg_handle_seconds, type: "NUMERIC(8,2)", scale: 2}
            - {name: adherence_pct, type: "NUMERIC(5,2)", scale: 2}
            - {name: occupancy_pct, type: "NUMERIC(5,2)", scale: 2}
            - {name: week_start_key, type: INT64}
        - table: agg_program_monthly
          expect_object_type: TABLE
          partition_by: period_month
          columns:
            - {name: client_sk, type: INT64}
            - {name: program_sk, type: INT64}
            - {name: line_of_business, type: STRING}
            - {name: interactions, type: INT64}
            - {name: avg_handle_seconds, type: "NUMERIC(8,2)", scale: 2}
            - {name: avg_csat, type: "NUMERIC(5,2)", scale: 2}
            - {name: billed_amount, type: "NUMERIC(14,2)", scale: 2}
            - {name: grouping_level, type: INT64}
            - {name: period_month, type: DATE}
        - table: agg_queue_hourly
          expect_object_type: TABLE
          partition_by: date_key
          columns:
            - {name: queue_sk, type: INT64}
            - {name: hour_of_day, type: INT64}
            - {name: offered, type: INT64}
            - {name: answered, type: INT64}
            - {name: abandoned, type: INT64}
            - {name: sl_pct, type: "NUMERIC(5,2)", scale: 2}
            - {name: forecast_volume, type: INT64}
            - {name: volume_variance_pct, type: "NUMERIC(7,2)", scale: 2}
            - {name: date_key, type: INT64}
        - table: agg_csat_rollup_monthly
          expect_object_type: TABLE
          partition_by: period_month
          columns:
            - {name: client_sk, type: INT64}
            - {name: program_sk, type: INT64}
            - {name: site_code, type: STRING}
            - {name: surveys, type: INT64}
            - {name: avg_csat, type: "NUMERIC(5,2)", scale: 2}
            - {name: pct_promoters, type: "NUMERIC(5,2)", scale: 2}
            - {name: pct_detractors, type: "NUMERIC(5,2)", scale: 2}
            - {name: grouping_id, type: INT64}
            - {name: period_month, type: DATE}
        - table: agg_billing_monthly
          expect_object_type: TABLE
          partition_by: period_month
          cluster_by: [client_sk, program_sk]
          columns:
            - {name: client_sk, type: INT64}
            - {name: program_sk, type: INT64}
            - {name: billed_amount, type: "NUMERIC(14,2)", scale: 2}
            - {name: sla_credit_amount, type: "NUMERIC(12,2)", scale: 2}
            - {name: telco_cost_amount, type: "NUMERIC(12,2)", scale: 2}
            - {name: net_revenue, type: "NUMERIC(14,2)", scale: 2}
            - {name: period_month, type: DATE}
        - table: agg_site_daily
          expect_object_type: TABLE
          partition_by: date_key
          columns:
            - {name: site_code, type: STRING}
            - {name: agents_active, type: INT64}
            - {name: interactions, type: INT64}
            - {name: avg_handle_seconds, type: "NUMERIC(8,2)", scale: 2}
            - {name: sl_pct, type: "NUMERIC(5,2)", scale: 2}
            - {name: adherence_pct, type: "NUMERIC(5,2)", scale: 2}
            - {name: date_key, type: INT64}
