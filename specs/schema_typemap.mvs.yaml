# schema_typemap.mvs.yaml — SOURCE CROSS-CHECK
# Proves legacy→target type mapping against live Hive source.
# AC2 (per-column fidelity: presence, name, ordinal, mapped type,
#       precision/scale, nested types, nullability, description)
#
# source_setup applies the legacy HQL to a sandbox Hive, then
# schema_conformance cross-checks each column's source_type.

name: schema_typemap

connections:
  source: { engine: impala }
  target: { engine: bigquery }

migration:
  steps:
    - { kind: ddl, sql: sql/ddl/02-staging-sqoop-mirrors.sql }
    - { kind: ddl, sql: sql/ddl/03-staging-delta-feeds.sql }
    - { kind: ddl, sql: sql/ddl/04-staging-file-feeds.sql }
    - { kind: ddl, sql: sql/ddl/05-ods-cleanse.sql }
    - { kind: ddl, sql: sql/ddl/06-ods-delta-scd2.sql }
    - { kind: ddl, sql: sql/ddl/07-ods-acid.sql }
    - { kind: ddl, sql: sql/ddl/08-dm-tables.sql }

source_setup:
  location_base: ${SOURCE_WAREHOUSE:-/tmp/dmt_src}
  ddl:
    - /workspace/source/hive/ddl/01-create-databases.hql
    - /workspace/source/hive/ddl/02-staging-sqoop-mirrors.hql
    - /workspace/source/hive/ddl/03-staging-delta-feeds.hql
    - /workspace/source/hive/ddl/04-staging-file-feeds.hql
    - /workspace/source/hive/ddl/05-ods-cleanse.hql
    - /workspace/source/hive/ddl/06-ods-delta-scd2.hql
    - /workspace/source/hive/ddl/07-ods-acid.hql
    - /workspace/source/hive/ddl/08-dm-tables.hql

suites:
  # ── staging (45 tables) ──
