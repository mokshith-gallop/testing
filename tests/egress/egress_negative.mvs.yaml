# P0-7 NEGATIVE twin — the export drops a row (WHERE invoice_id <> 5005), so it
# diverges from legacy. Byte-identity, row_cnt, and control_total must all FAIL.
name: p0_7_negative
description: lossy export — harness must FAIL.

connections:
  source: { engine: impala }
  target: { engine: bigquery }

suites:
  - pattern: egress_parity
    id: invoice-egress-lossy
    source_database: "${SOURCE_DATABASE}"
    exports:
      - id: invoice_export_lossy
        columns: [invoice_id, contact_id, amount]
        control_total_column: amount
        source_sql: "SELECT invoice_id, contact_id, amount FROM ${SOURCE_DATABASE}.ods_invoice_acid"
        target_export_sql: >
          EXPORT DATA OPTIONS(
            uri='gs://${SANDBOX_BUCKET}/p0-7/invoice_lossy/*.json', format='JSON', overwrite=true) AS
          SELECT invoice_id, contact_id, amount
          FROM `${GCP_PROJECT}.${BQ_DATASET_1}.ods_invoice`
          WHERE invoice_id <> 5005
        export_uri_prefix: "gs://${SANDBOX_BUCKET}/p0-7/invoice_lossy/"
